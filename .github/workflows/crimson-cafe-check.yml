name: Crimson Café Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, agent/crimson-cafe-mvp]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck GitHub Pages build
        run: npm run typecheck:pages

      - name: Build GitHub Pages version
        run: npm run build:pages

      - name: Upload static preview artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: crimson-cafe-pages-preview
          path: dist
          if-no-files-found: error
          retention-days: 7
